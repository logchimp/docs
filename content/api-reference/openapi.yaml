openapi: 3.1.0
info:
  title: LogChimp
  description: |
    "Meet a next-generation software turning feedback into a future roadmap. LogChimp makes every customer voice count."

    Getting started and learn more:
    * [Website](https://logchimp.codecarrot.net)
    * [Documentation](https://docs.logchimp.codecarrot.net)
    * [GitHub](https://github.com/logchimp/logchimp)
  version: 0.4.0
  contact:
    name: CodeCarrot
    email: logchimp@codecarrot.net
servers:
  - url: '{protocol}://{host-with-port}/api/v1'
    description: "API URL"
    variables:
      protocol:
        enum:
          - 'http'
          - 'https'
        default: 'http'
      host-with-port:
        default: 'localhost:8000'

security:
  - bearerAuth: [ ]

tags:
  - name: auth
    description: "Endpoints related to account authentication via email and password"
  - name: users
    description: "Endpoints related to users"
  - name: posts
    description: "Endpoints related to posts"
  - name: comments
    description: "Endpoints related to posts comments and posts activities"
  - name: boards
    description: "Endpoints related to boards"
  - name: roadmaps
    description: "Endpoints related to roadmaps"
  - name: roles
    description: "Endpoints related to roles and permissions"
  - name: settings
    description: "Endpoints related to LogChimp settings"

paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: Login
      description: 'Login to account using email and password.'
      operationId: userSignin
      requestBody:
        $ref: '#/components/requestBodies/Login'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    $ref: "#/components/schemas/AuthUser"
        400:
          description: "Bad Request"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EmailInvalidErrorCode"
                  - $ref: "#/components/schemas/InvalidUserIdErrorCode"
                  - $ref: "#/components/schemas/UserBlockedErrorCode"
                  - type: object
                    description: No password provided
                    properties:
                      message:
                        type: "string"
                        example: "No password provided"
                      code:
                        type: "string"
                        example: "PASSWORD_MISSING"
                  - type: object
                    description: Incorrect password
                    properties:
                      message:
                        type: "string"
                        example: "Incorect password"
                      code:
                        type: "string"
                        example: "INCORRECT_PASSWORD"
        500:
          $ref: "#/components/responses/InternalServerError"
      security: [ ]
  /auth/signup:
    post:
      tags:
        - auth
      summary: Sign up
      description: Create a new user account.
      operationId: userSignup
      requestBody:
        $ref: '#/components/requestBodies/Login'
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    $ref: "#/components/schemas/AuthUser"
        400:
          description: "Bad Request"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MailConfigurationErrorCode"
                  - $ref: "#/components/schemas/EmailInvalidErrorCode"
                  - type: object
                    description: "Missing password"
                    properties:
                      message:
                        type: "string"
                        example: "No password provided"
                      code:
                        type: "string"
                        example: "PASSWORD_MISSING"
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "You do not have permission to perform this action."
                      code:
                        type: string
                        example: "SIGNUP_NOT_ALLOWED"
        500:
          $ref: "#/components/responses/InternalServerError"
      security: [ ]
  /auth/setup:
    get:
      tags:
        - auth
      summary: Site setup
      description: 'Get site setup information.'
      operationId: getSiteSetup
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_setup:
                    type: boolean
                    example: true
        400:
          description: "Bad request"
        500:
          $ref: "#/components/responses/InternalServerError"
      security: [ ]
    post:
      tags:
        - auth
      summary: Site setup
      description: 'Setup the site by creating the owner account.'
      operationId: siteSetup
      requestBody:
        description: 'Site setup request body'
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/LoginRequest'
                - type: object
                  properties:
                    siteTitle:
                      type: string
                      description: This will be shown across the website on public pages and dashboard.
                      example: "LogChimp"
                    name:
                      type: string
                      example: "Mike"
        required: true
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    $ref: "#/components/schemas/AuthUser"
        400:
          description: "Bad Request"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EmailInvalidErrorCode"
                  - type: object
                    description: "Missing password"
                    properties:
                      message:
                        type: "string"
                        example: "No password provided"
                      code:
                        type: "string"
                        example: "PASSWORD_MISSING"
        403:
          description: "Access denied"
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "Setup has already been completed."
                      code:
                        type: string
                        example: "SETUP_COMPLETED"
        500:
          $ref: "#/components/responses/InternalServerError"
        501:
          description: "Not implemented"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MailConfigurationErrorCode"
      security: [ ]
  /auth/email/verify:
    post:
      tags:
        - auth
      summary: Send verification email
      description: |
        Send a verification email to the user email address.
        The email is only sent if have configured [SMTP mail server](https://docs.logchimp.codecarrot.net/docs/environment-variables#mail) are configured at the time of deploying LogChimp.
      operationId: sendVerificationEmail
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  verify:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
        400:
          description: "Bad Request"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EmailInvalidErrorCode"
                  - $ref: "#/components/schemas/InvalidUserIdErrorCode"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/UserNotFoundErrorCode"
        409:
          description: "Conflict"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EmailVerifiedErrorCode"
        500:
          $ref: "#/components/responses/InternalServerError"
        501:
          description: "Not implemented"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MailConfigurationErrorCode"
      security:
        - bearerAuth: [ ]
  /posts:
    post:
      tags:
        - posts
      summary: Create post
      description: Create a new post
      operationId: createPost
      requestBody:
        $ref: '#/components/requestBodies/CreatePostRequestBody'
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                type: object
                properties:
                  post:
                    type: object
                    $ref: '#/components/schemas/CreatePostResponse'
        403:
          description: "Access denied"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/NotEnoughPermissionErrorCode"
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: [ ]
    patch:
      tags:
        - posts
      summary: Update post
      description: Update a post
      operationId: updatePost
      responses:
        200:
          description: "OK"
        403:
          description: "Access denied"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/NotEnoughPermissionErrorCode"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PostNotFoundErrorCode"
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: [ ]
    delete:
      tags:
        - posts
      summary: Delete post
      description: Delete a posts
      operationId: deletePost
      requestBody:
        description: "Delete post request body"
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
      responses:
        204:
          description: "Post deletion request accepted."
        403:
          description: "Access denied"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/NotEnoughPermissionErrorCode"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PostNotFoundErrorCode"
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: [ ]
  /posts/get:
    post:
      tags:
        - posts
      summary: List all posts
      description: Get all the posts
      operationId: filterPosts
      requestBody:
        $ref: '#/components/requestBodies/FilterPostRequestBody'
      responses:
        200:
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
        400:
          description: "Bad request"
        500:
          $ref: "#/components/responses/InternalServerError"
      security: [ ]
  /posts/slug:
    post:
      tags:
        - posts
      summary: Post by Slug
      description: Get post by Slug
      operationId: postBySlug
      requestBody:
        $ref: '#/components/requestBodies/PostBySlugRequestBody'
      responses:
        200:
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  post:
                    $ref: '#/components/schemas/DashboardPost'
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PostNotFoundErrorCode"
        500:
          $ref: "#/components/responses/InternalServerError"
      security: [ ]
  /votes:
    post:
      tags:
        - votes
      summary: Add Vote to post
      description: Vote on a post
      operationId: addVoteToPost
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - postId
              properties:
                postId:
                  type: string
                  description: "ID of the post to vote on."
      responses:
        201:
          description: "Vote added"
          content:
            application/json:
              schema:
                type: object
                properties:
                  voters:
                    $ref: "#/components/schemas/PostVote"
        403:
          description: "Access denied"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/NotEnoughPermissionErrorCode"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PostNotFoundErrorCode"
        409:
          description: "Conflict"
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: "User has already voted on this post."
                    properties:
                      message:
                        type: string
                        example: "Vote already exists"
                      code:
                        type: string
                        example: "VOTE_EXISTS"
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        -  bearerAuth: [ ]
    delete:
      tags:
        - votes
      summary: Remove vote from post
      description: Remove vote from a post
      operationId: removeVoteFromPost
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - postId
              properties:
                postId:
                  type: string
                  description: "ID of the post to vote on."
      responses:
        200:
          description: "Vote removed"
          content:
            application/json:
              schema:
                type: object
                properties:
                  voters:
                    $ref: "#/components/schemas/PostVote"
        403:
          description: "Access denied"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/NotEnoughPermissionErrorCode"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PostNotFoundErrorCode"
                  - type: object
                    description: "Vote has already been removed or does not exist from this post."
                    properties:
                      message:
                        type: string
                        example: "Vote not found"
                      code:
                        type: string
                        example: "VOTE_NOT_FOUND"
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        -  bearerAuth: [ ]
  /boards:
    get:
      tags:
        - boards
      summary: List all boards
      description: Get all the boards
      operationId: filterBoards
      parameters:
        - name: created
          in: query
          schema:
            type: string
            default: "desc"
            description: "Borders are sorted by date creation."
        - name: limit
          in: query
          schema:
            type: string
            default: "10"
            description: ""
        - name: page
          in: query
          schema:
            type: string
            default: "1"
            description: ""
        - name: Content-Type
          in: header
          schema:
            type: string
            default: application/json
            description: ""
      requestBody:
        description: Get all the boards
        content:
          application/json:
            schema:
              type: object
        required: false
      responses:
        200:
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  boards:
                    type: array
                    items:
                      type: object
                      $ref: '#/components/schemas/BoardDetail'
        400:
          description: "Bad request"
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: [ ]
        - { }
  /roadmaps:
    get:
      tags:
        - roadmaps
      summary: Get all roadmaps
      description: "Get all roadmaps"
      operationId: filterRoadmaps
      parameters:
        - $ref: "#/components/parameters/CursorPaginationFirstParam"
        - $ref: "#/components/parameters/CursorPaginationAfterParam"
        - name: visibility
          in: query
          description: ""
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/FilterVisibility"
      responses:
        200:
          description: "OK"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPaginationMeta'
                  - type: object
                    required:
                      - results
                      - roadmaps
                    properties:
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/RoadmapPrivate"
                      roadmaps:
                        type: array
                        items:
                          $ref: "#/components/schemas/RoadmapPrivate"
        400:
          description: "Bad request"
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: "Invalid query params"
                    properties:
                      code:
                        type: string
                        example: "VALIDATION_ERROR"
                      message:
                        type: string
                        example: "Invalid query parameters"
                      errors:
                        type: array
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: [ ]
        - { }
  /roadmaps/{url}:
    get:
      tags:
        - roadmaps
      summary: Roadmap by Url
      description: Get roadmap by Url
      operationId: roadmapByUrl
      parameters:
        - name: url
          in: path
          required: true
          schema:
            type: string
          description: "Roadmap slug"
      responses:
        200:
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  roadmap:
                    $ref: '#/components/schemas/Roadmap'
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: "Roadmap not found"
                    properties:
                      message:
                        type: string
                        example: "Roadmap not found"
                      code:
                        type: string
                        example: "ROADMAP_ID_OR_URL_MISSING"
        500:
          $ref: "#/components/responses/InternalServerError"
      security: [ ]
  /roadmaps/search/{name}:
    get:
      tags:
        - roadmaps
      summary: Search roadmaps by name
      description: Search roadmaps by name
      operationId: searchRoadmaps
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: "Roadmap name"
      responses:
        200:
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  roadmaps:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoadmapPrivate'
        403:
          description: "Access denied"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/NotEnoughPermissionErrorCode"
        500:
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: [ ]
components:
  parameters:
    CursorPaginationFirstParam:
      name: first
      in: query
      description: Number of items to return in a request
      required: false
      schema:
        type: number
        minimum: 1
    CursorPaginationAfterParam:
      name: after
      in: query
      description: Cursor for pagination
      required: false
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: JWT Bearer token authentication
  schemas:
    FilterVisibility:
      enum:
        - 'public'
        - 'private'
    CursorPaginationMeta:
      type: object
      required:
        - page_info
      properties:
        page_info:
          $ref: '#/components/schemas/CursorPaginationPageInfo'
        total_pages:
          type: integer
          nullable: true
        total_count:
          type: integer
          nullable: true
    CursorPaginationPageInfo:
      required:
        - count
        - current_page
        - has_next_page
      properties:
        count:
          type: integer
          description: Number of items in current page
        current_page:
          type: integer
          description: Current page number
        has_next_page:
          type: boolean
          description: Whether there are more pages
        end_cursor:
          type: string
          nullable: true
          description: Cursor for the last item
        start_cursor:
          type: string
          nullable: true
          description: Cursor for the first item
    PostInfo:
      type: object
      required:
        - postId
        - title
        - slug
        - updatedAt
        - createdAt
      properties:
        postId:
          type: string
        title:
          type: string
        slug:
          type: string
        contentMarkdown:
          type: string
        createdAt:
          type: string
          example: "2025-09-23T13:28:01.611Z"
        updatedAt:
          type: string
          example: "2025-09-23T13:28:01.611Z"
    Post:
      allOf:
        - $ref: "#/components/schemas/PostInfo"
        - type: object
          required:
            - board
            - author
            - voters
          properties:
            board:
              $ref: '#/components/schemas/Board'
            author:
              $ref: '#/components/schemas/PublicUserInfo'
            roadmap:
              $ref: '#/components/schemas/Roadmap'
            voters:
              $ref: '#/components/schemas/PostVote'
    DashboardPost:
      allOf:
        - $ref: "#/components/schemas/Post"
        - type: object
          required:
            - slugId
          properties:
            slugId:
              type: string
    PublicUserInfo:
      type: object
      required:
        - userId
        - username
      properties:
        userId:
          type: string
        name:
          type: string
        avatar:
          type: string
        username:
          type: string
    CreatePostResponse:
      type: object
      required:
        - postId
      properties:
        postId:
          type: string
        title:
          type: string
        slug:
          type: string
        slugId:
          type: string
        contentMarkdown:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          example: "2025-09-23T13:28:01.611Z"
        updatedAt:
          type: string
          example: "2025-09-23T13:28:01.611Z"
        boardId:
          type: string
        roadmap_id:
          type: string
    Roadmap:
      type: object
      required:
        - id
        - name
        - url
        - color
      properties:
        id:
          type: object
        name:
          type: object
        url:
          type: object
        color:
          type: object
    RoadmapPrivate:
      allOf:
        - $ref: "#/components/schemas/Roadmap"
        - type: object
          required:
            - index
            - display
            - created_at
          properties:
            index:
              type: number
            display:
              type: boolean
            created_at:
              type: string
              example: "2025-09-23T13:28:01.611Z"
    PostVote:
      type: object
      required:
        - votes
        - votesCount
      properties:
        votes:
          type: array
          items:
            $ref: "#/components/schemas/UserVote"
        votesCount:
          type: number
          example: 10
        viewerVote:
          $ref: "#/components/schemas/CurrentUserVote"
    UserVote:
      allOf:
        - $ref: "#/components/schemas/CurrentUserVote"
        - type: object
          required:
            - username
          properties:
            name:
              type: string
            username:
              type: string
            avatar:
              type: string
    CurrentUserVote:
      type: object
      required:
        - voteId
        - userId
        - postId
        - createdAt
      properties:
        voteId:
          type: string
        userId:
          type: string
        postId:
          type: string
        createdAt:
          type: string
          example: "2025-09-23T13:28:01.611Z"
    UserBlockedErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "User is Blocked"
        code:
          type: string
          example: "USER_BLOCKED"
    InvalidUserIdErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "Invalid user ID"
        code:
          type: string
          example: "INVALID_USER_ID"
    NotEnoughPermissionErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "You do not have permission to perform this action."
        code:
          type: string
          example: "NOT_ENOUGH_PERMISSION"
    PostNotFoundErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "Post not found"
        code:
          type: string
          example: "POST_NOT_FOUND"
    UserNotFoundErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "User not found"
        code:
          type: string
          example: "USER_NOT_FOUND"
    EmailInvalidErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "Enter valid email"
        code:
          type: string
          example: "EMAIL_INVALID"
    EmailVerifiedErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "Your email has already been verified."
        code:
          type: string
          example: "EMAIL_VERIFIED"
    MailConfigurationErrorCode:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
          example: "Mail configuration missing"
        code:
          type: string
          example: "MAIL_CONFIG_MISSING"
    Board:
      type: object
      required:
        - boardId
        - name
        - url
        - color
        - createdAt
      properties:
        boardId:
          type: string
          format: uuid
          example: 11c14790-b4d3-4689-942c-55548cfdd8a6
        name:
          type: string
          example: "🔗 Integrations"
        color:
          type: string
          format: color
          example: "4A90E2"
        url:
          type: string
          example: 'integrations-dsgksdIUYO'
        createdAt:
          type: string
          example: "2025-09-23T13:28:01.611Z"
    BoardDetail:
      allOf:
        - $ref: "#/components/schemas/Board"
        - type: object
          properties:
            post_count:
              type: string
              example: "42"
    AuthUser:
      type: object
      properties:
        authToken:
          type: string
          example: |
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiIxZjEzN2QyMy04NDYzLTQ5NjEtYjY2NS1hNWQ4ZjE2NzVlNzciLCJlbWFpbCI6ImFkbWluQG1lLm1lIiwidHlwZSI6ImVtYWlsVmVyaWZpY2F0aW9uIiwiaWF0IjoxNzU3MzQ2NzE3LCJleHAiOjE3NTc1MTk1MTd9.2lmZpMdltMSk3PSyGOFR5dUuy4RMjxAzDgaFaNUmeNo
        userId:
          type: string
          example: 1f137d23-8463-4961-b665-a5d8f1675e77
        name:
