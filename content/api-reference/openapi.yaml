            https://www.gravatar.com/avatar/fc51027a642571734eaaefd103b2f00c
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: "string"
          format: "email"
          example: mike@example.com
        password:
          type: string
          format: password
          example: "password"
  requestBodies:
    CreatePostRequestBody:
      description: Create post request body
      content:
        application/json:
          schema:
            type: object
            required:
              - title
            properties:
              title:
                type: string
              contentMarkdown:
                type: string
              boardId:
                type: string
              roadmapId:
                type: string
    PostBySlugRequestBody:
      description: "Post by Slug request body"
      content:
        application/json:
          schema:
            type: object
            required:
              - slug
            properties:
              slug:
                type: string
                example:
              userId:
                type: string
                format: uuid
                example: "11c14790-b4d3-4689-942c-55548cfdd8a6"
    FilterPostRequestBody:
      description: Filter post request body
      content:
        application/json:
          schema:
            type: object
            required:
              - page
              - created
            properties:
              userId:
                type: string
                format: uuid
                example: "11c14790-b4d3-4689-942c-55548cfdd8a6"
              boardId:
                type: array
                description: "Default is all empty array."
                items:
                  type: string
                  format: uuid
                  example: "11c14790-b4d3-4689-942c-55548cfdd8a6"
              roadmapId:
                type: string
                format: uuid
                example: "11c14790-b4d3-4689-942c-55548cfdd8a6"
              page:
                type: number
                example: 1
              limit:
                type: number
                example: 10
                description: |
                  "Number of posts to return in a single request. Default is 10."
              created:
                type: string
                example: desc
                description: "Sort posts by creation date in 'asc' or 'desc' order."
    Login:
      description: Login to account using email and password.
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LoginRequest"
  responses:
    InternalServerError:
      description: "Internal server error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Something went wrong!"
              code:
                type: string
                example: "SERVER_ERROR"
